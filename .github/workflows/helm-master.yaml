name: Publish Helm Chart to Github

on:
  push:
    branches:
      - master
    paths:
      - charts/kaet-helm/**

jobs:
  release-helm-chart:
    runs-on: ubuntu-latest

    permissions:
      packages: write
      contents: read

    steps:
      - name: Code Checkout
        uses: actions/checkout@v4
      
      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.18.0

      - name: Login to GHCR
        run: |
          helm registry login ghcr.io -u ${{ github.actor }} --password "${{ secrets.GITHUB_TOKEN }}"

      - name: Push Chart to GHCR
        run: |
          helm package charts/kaet-helm
          helm push kaet-helm-*.tgz oci://ghcr.io/ing-bank
