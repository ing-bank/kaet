name: Tests

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '^1.23.0'
      - run: go env -w GOPRIVATE=github.com/ing-bank/*
      - run: go test -timeout=5m $(go list ./... | grep -v /vendor/)